services:
  mysql:
    image: 'mysql:latest'
    container_name: 'MS-restricciones_bd'
    environment:
      - 'MYSQL_DATABASE=bd_restricciones'
      - 'MYSQL_ROOT_PASSWORD=root'

    ports:
      - '3320:3306'

    volumes:
      - ./mysql_restricciones_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: MS_restricciones_gui
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - '9020:80'